services:
  dev:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: package-ci
    image: keboola/php-datatypes
    volumes:
      - ./:/code

  dev-xdebug:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: package-ci-xdebug
    image: keboola/php-datatypes-xdebug
    volumes:
      - ./:/code
